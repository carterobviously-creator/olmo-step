<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>OLMO‑STEP (GitHub + Pollinations + gpt-oss-120b)</title>
<style>
  body { background:#05060a; color:#f5f5f5; font-family:system-ui; padding:20px; }
  textarea { width:100%; height:100px; background:#10121a; color:#f5f5f5; border:1px solid #333; padding:8px; }
  button { padding:8px 14px; margin-top:8px; background:#4f46e5; color:white; border:none; border-radius:4px; cursor:pointer; }
  pre { background:#10121a; padding:10px; border-radius:4px; max-height:260px; overflow:auto; }
</style>
</head>
<body>

<h1>OLMO‑STEP (GitHub + Pollinations + gpt-oss-120b)</h1>
<p><small>Pollinations → JSON • WebAudio + Web TTS → Music</small></p>

<textarea id="prompt">make a chill lofi song about coding late at night</textarea><br>
<button id="go">Generate & Play</button>
<p id="status"></p>

<h3>Generated JSON</h3>
<pre id="jsonOut">{}</pre>

<script>
// ⭐ WORKING FREE MODEL ⭐
const MODEL = "gpt-oss-120b";

// Pollinations legacy endpoint (GitHub Pages is allowed)
const POLL_URL = "https://text.pollinations.ai/openai/chat/completions";

const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

document.getElementById("go").onclick = async () => {
  const prompt = document.getElementById("prompt").value.trim();
  const status = document.getElementById("status");
  const out = document.getElementById("jsonOut");

  status.textContent = "Contacting Pollinations…";

  try {
    const song = await fetchSong(prompt);
    out.textContent = JSON.stringify(song, null, 2);

    status.textContent = "Playing…";
    await playSong(song);
    status.textContent = "Done.";
  } catch (e) {
    status.textContent = "Error: " + e.message;
  }
};

async function fetchSong(userPrompt) {
  const systemPrompt = `
You are OLMO-STEP, a JSON-only music generator.
Output ONLY valid JSON.

Rules:
- Top-level: title, bpm, key, sections[].
- Each section: name, lyrics, melody[0–11], instrument, drums[{time,hit}].
- No text outside JSON.
  `.trim();

  const body = {
    model: MODEL,
    messages: [
      { role: "system", content: systemPrompt },
      { role: "user", content: userPrompt }
    ]
  };

  const res = await fetch(POLL_URL, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(body)
  });

  if (!res.ok) {
    const text = await res.text().catch(() => "");
    throw new Error("Pollinations HTTP " + res.status + " " + text);
  }

  const data = await res.json();
  const raw = data.choices[0].message.content;
  const json = extractJson(raw);
  return JSON.parse(json);
}

function extractJson(text) {
  const s = text.indexOf("{");
  const e = text.lastIndexOf("}");
  if (s === -1 || e === -1) throw new Error("No JSON found");
  return text.slice(s, e + 1);
}

async function playSong(song) {
  const bpm = song.bpm || 90;
  const beat = 60 / bpm;

  const kick = await makeClick(80);
  const snare = await makeNoise();
  const hat = await makeClick(400);

  const drums = { kick, snare, hat };

  let t = audioCtx.currentTime + 0.5;

  for (const sec of song.sections) {
    speak(sec.lyrics);

    playMelody(sec.melody || [], sec.instrument || "sine", t, beat);
    playDrums(sec.drums || [], drums, t, beat);

    const secLen = Math.max(
      (sec.melody || []).length,
      (sec.drums || []).reduce((m, d) => Math.max(m, d.time || 0), 0) + 1
    );

    t += secLen * beat + 0.5;
  }
}

function playMelody(melody, type, start, beat) {
  melody.forEach((deg, i) => {
    const t = start + i * beat;
    const osc = audioCtx.createOscillator();
    const g = audioCtx.createGain();

    osc.type = type;
    const midi = 60 + deg;
    osc.frequency.value = 440 * Math.pow(2, (midi - 69) / 12);

    g.gain.setValueAtTime(0, t);
    g.gain.linearRampToValueAtTime(0.4, t + 0.01);
    g.gain.linearRampToValueAtTime(0, t + 0.3);

    osc.connect(g).connect(audioCtx.destination);
    osc.start(t);
    osc.stop(t + 0.35);
  });
}

function playDrums(drums, buffers, start, beat) {
  drums.forEach(d => {
    const buf = buffers[d.hit];
    if (!buf) return;

    const src = audioCtx.createBufferSource();
    src.buffer = buf;
    src.connect(audioCtx.destination);
    src.start(start + (d.time || 0) * beat);
  });
}

async function makeClick(freq) {
  const length = audioCtx.sampleRate * 0.05;
  const buffer = audioCtx.createBuffer(1, length, audioCtx.sampleRate);
  const data = buffer.getChannelData(0);
  for (let i = 0; i < length; i++) {
    const env = 1 - i / length;
    data[i] = Math.sin(2 * Math.PI * freq * (i / audioCtx.sampleRate)) * env;
  }
  return buffer;
}

async function makeNoise() {
  const length = audioCtx.sampleRate * 0.1;
  const buffer = audioCtx.createBuffer(1, length, audioCtx.sampleRate);
  const data = buffer.getChannelData(0);
  for (let i = 0; i < length; i++) {
    const env = 1 - i / length;
    data[i] = (Math.random() * 2 - 1) * env;
  }
  return buffer;
}

function speak(text) {
  if (!("speechSynthesis" in window)) return;
  const u = new SpeechSynthesisUtterance(text);
  u.rate = 1;
  u.pitch = 1;
  speechSynthesis.speak(u);
}
</script>

</body>
</html>
